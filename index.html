<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherVibe Collector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <button onclick="showPage('suggest')">Daily Suggestion</button>
        <button onclick="showPage('collection')">My Collection</button>
    </nav>

    <main id="suggest-page" class="page">
        <header>
            <h1>Today's Vibe</h1>
            <div id="weather-display">Fetching your weather...</div>
        </header>
        <section id="recommendation-area">
            <div class="card">
                <h2>Recommended Album</h2>
                <div id="suggested-album">Add albums to your collection to get started!</div>
            </div>
        </section>
    </main>

    <main id="collection-page" class="page" style="display:none;">
        <header>
            <h1>My Music Vault</h1>
        </header>
        
        <section class="add-album card">
            <h3>Add New Album</h3>
            <input type="text" id="albumTitle" placeholder="Album Title">
            <input type="text" id="albumArtist" placeholder="Artist">
            <select id="albumVibe">
                <option value="Sunny">Sunny/Happy</option>
                <option value="Rainy">Rainy/Chill</option>
                <option value="Cloudy">Cloudy/Moody</option>
                <option value="Snowy">Snowy/Cozy</option>
            </select>
            <button onclick="addAlbum()">Add to Collection</button>
        </section>

        <section id="collection-list">
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
