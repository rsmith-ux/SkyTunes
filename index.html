<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Music Matcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🎵 Mood Music Match</h1>
            <p>How are you feeling today?</p>
        </header>

        <section class="input-area">
            <select id="moodSelect">
                <option value="" disabled selected>Select a mood...</option>
                <option value="happy">Happy & Energetic</option>
                <option value="chill">Chill & Relaxed</option>
                <option value="sad">Sad & Reflective</option>
                <option value="focus">Deep Focus</option>
            </select>
            <button id="matchBtn">Find My Vibe</button>
        </section>

        <section id="results" class="results-area">
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
